services:
  postgres:
    image: postgres:16-alpine
    container_name: business-management-app-postgres
    environment:
      # Local development credentials only. Do not reuse in shared or production environments.
      POSTGRES_DB: business_management_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d business_management_app"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
