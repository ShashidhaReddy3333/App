name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: business_management_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d business_management_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/business_management_app?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/business_management_app?schema=public
      SESSION_SECRET: 12345678901234567890123456789012
      APP_URL: http://127.0.0.1:3000
      DEMO_MODE: "true"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm env:check
      - run: pnpm prisma:generate
      - run: pnpm prisma:reset
      - run: pnpm prisma:seed
      - run: pnpm exec prisma validate
      - run: pnpm audit --production --audit-level=moderate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm build
      - run: pnpm ops:check-data
